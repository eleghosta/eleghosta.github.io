<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>ele的文字</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  width:100vw;
  height:100vh;
  background: url('https://picsum.photos/1920/1080?random=12') center/cover no-repeat fixed;
  animation: bgZoom 40s infinite alternate ease-in-out;
  font-family: system-ui, -apple-system, sans-serif;
  overflow: hidden;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

@keyframes bgZoom {
  0% { transform: scale(1); }
  100% { transform: scale(1.1); }
}

.menu-box{
  position:fixed;
  top:22px;
  left:22px;
  z-index:999;
}
.menu-btn{
  width:52px;
  height:52px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:14px;
  color:#fff;
  font-size:26px;
  display:grid;
  place-content:center;
  cursor:pointer;
  transition: transform 0.3s cubic-bezier(0.33, 1, 0.68, 1);
}
.menu-btn:active{ transform: scale(0.93); }

.menu-list{
  margin-top:10px;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:16px;
  padding:16px;
  min-width:190px;
  opacity:0;
  transform: translateX(-40px) scale(0.92);
  pointer-events:none;
  transition: all 0.5s cubic-bezier(0.25, 1, 0.25, 1);
}
.menu-list.show{
  opacity:1;
  transform: translateX(0) scale(1);
  pointer-events:auto;
}

.menu-list a{
  display:block;
  color:#fff;
  text-decoration:none;
  padding:13px;
  margin:6px 0;
  background:rgba(255,255,255,.08);
  border-radius:10px;
  text-align:center;
  transition: background 0.25s ease;
}
.menu-list a:hover{ background:rgba(255,255,255,.2); }

.center-box{
  text-align:center;
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:28px;
  padding:40px 30px;
  width: 90%;
  max-width: 450px;
  animation: panelFade 1.2s cubic-bezier(0.25, 1, 0.25, 1) forwards;
}

@keyframes panelFade{
  from{opacity:0; transform:translateY(30px) scale(0.95);}
  to{opacity:1; transform:translateY(0) scale(1);}
}

.time{
  font-size: clamp(40px, 10vw, 64px);
  font-weight: 300;
  margin-bottom: 5px;
  font-variant-numeric: tabular-nums;
}
.date{
  font-size: 16px;
  opacity: .8;
  margin-bottom: 25px;
}
.hitokoto-box {
  margin-bottom: 30px;
  padding: 0 10px;
}
.hitokoto-text {
  font-size: 18px;
  font-style: italic;
  font-weight: 300;
  line-height: 1.5;
  margin-bottom: 8px;
  display: block;
}
.hitokoto-from {
  font-size: 13px;
  opacity: 0.6;
}
.weather{
  font-size:15px;
  background:rgba(0,0,0,.2);
  padding:8px 18px;
  border-radius:20px;
  display:inline-block;
  border: 1px solid rgba(255,255,255,0.1);
}

/* 编辑弹窗样式 */
.editor-layer{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(12px);
  z-index:1000;
  display:none;
  place-items:center;
  padding:20px;
}
.editor-box{
  width:100%;max-width:700px;height:80vh;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.editor-head{
  padding:16px;background:rgba(255,255,255,.05);
  display:flex;justify-content:space-between;align-items:center;
}
.editor-body{
  flex:1;background:#111;color:#fff;
  padding:20px;font-size:16px;line-height:1.6;
  border:none;outline:none;
}
.editor-foot{
  padding:12px;background:rgba(255,255,255,.05);
  display:flex;justify-content:flex-end;gap:10px;
}
.editor-foot button{
  padding:8px 16px;border-radius:10px;border:none;cursor:pointer;}

.pwd-layer{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  z-index:1001;
  display:none;
  place-items:center;
}
.pwd-box{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.15);
  padding:30px;border-radius:20px;
  text-align:center;width:90%;max-width:360px;
}
.pwd-box input{
  width:100%;padding:12px 16px;
  background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.15);
  border-radius:12px;color:#fff;margin:16px 0;outline:none;
}
.pwd-box button{
  padding:10px 24px;border-radius:12px;border:none;background:#fff;color:#000;cursor:pointer;
}
</style>
</head>
<body>

<div class="menu-box">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="menu-list" id="menu">
    <a href="javascript:openArticle()">第一篇文章</a>
    <a href="#">随笔日记</a>
    <a href="#">小说片段</a>
  </div>
</div>

<div class="center-box">
  <div class="time" id="time">00:00:00</div>
  <div class="date" id="date">正在读取日期...</div>
  
  <div class="hitokoto-box">
    <span class="hitokoto-text" id="hitokoto_text">正在获取名句...</span>
    <span class="hitokoto_from" id="hitokoto_from"></span>
  </div>

  <div class="weather" id="weather">获取天气中...</div>
</div>

<!-- 文章编辑 -->
<div class="pwd-layer" id="pwdLayer">
  <div class="pwd-box">
    <h3>输入编辑密码</h3>
    <input type="password" id="pwd" placeholder="请输入密码">
    <button onclick="checkPwd()">确认</button>
  </div>
</div>

<div class="editor-layer" id="editorLayer">
  <div class="editor-box">
    <div class="editor-head"><span>编辑第一篇文章</span><button onclick="closeEditor()">关闭</button></div>
    <textarea class="editor-body" id="articleContent"></textarea>
    <div class="editor-foot">
      <button onclick="saveArticle()">保存内容</button>
    </div>
  </div>
</div>

<script>
function toggleMenu(){
  document.getElementById('menu').classList.toggle('show');
}

function updateTime(){
  let d = new Date();
  document.getElementById('time').innerText = d.toLocaleTimeString('zh-CN',{hour12:false});
  let w = '日一二三四五六'[d.getDay()];
  document.getElementById('date').innerText = 
    `${d.getFullYear()}年${(d.getMonth()+1+'').padStart(2,0)}月${(d.getDate()+'').padStart(2,0)}日 星期${w}`;
}
setInterval(updateTime,1000);
updateTime();

fetch('https://v1.hitokoto.cn')
  .then(r=>r.json())
  .then(d=>{
    document.getElementById('hitokoto_text').innerText=d.hitokoto;
    document.getElementById('hitokoto_from').innerText=`——「${d.from}」`;
  })

fetch('https://api.weatherapi.com/v1/current.json?key=e83f0266f46a4777bf4101312251903&q=Changchun&lang=zh')
  .then(r=>r.json())
  .then(d=>{
    document.getElementById('weather').innerText=`${d.location.name}·${d.current.condition.text}·${d.current.temp_c}℃`;
  })

// 文章编辑逻辑
const PASSWORD = "123456";
const articleText = "这里是你的第一篇文章内容，可以在这里实时编辑。";

function openArticle(){
  document.getElementById('pwdLayer').style.display='grid';
  document.getElementById('pwd').value='';
}
function checkPwd(){
  const v=document.getElementById('pwd').value.trim();
  if(v===PASSWORD){
    document.getElementById('pwdLayer').style.display='none';
    document.getElementById('articleContent').value=articleText;
    document.getElementById('editorLayer').style.display='grid';
  }else alert("密码错误");
}
function closeEditor(){
  document.getElementById('editorLayer').style.display='none';
}
function saveArticle(){
  alert("已保存文章内容！");
  closeEditor();
}
</script>
</body>
</html>
